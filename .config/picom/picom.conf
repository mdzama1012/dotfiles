# picom config by Mohd Zama

###############################
#        Animations           #
###############################
# Uncomment the block below to enable window animations.
animations = (
  {
      triggers = [ "open", "show" ];
      preset = "fly-in";
      scale = 0.5;
      duration = 0.25;
  },
  {
      triggers = [ "close", "hide" ];
      preset = "fly-out";
      scale = 0.5;
      duration = 0.1;
  },
  {
      triggers = [ "geometry" ];
      preset = "geometry-change";
      duration = 0.25;
  }
);

###############################
#     General Settings        #
###############################
experimental-backends = true;
backend = "glx";
vsync = true;

# Mark windows for focus tracking
mark-wmwin-focused   = true;
mark-ovredir-focused = true;

# Enable client feature detection
detect-rounded-corners = true;
detect-client-opacity    = true;
detect-transient         = true;
detect-client-leader     = true;

use-damage = false;
log-level  = "info";

# Window types configuration
wintypes: {
  normal        = { fade = true;  shadow = true;  };
  tooltip       = { fade = true;  shadow = true; opacity = 1; focus = true; full-shadow = false; };
  dock          = { shadow = false; };
  dnd           = { shadow = false; };
  popup_menu    = { opacity = 1;  fade = true;  };
  dropdown_menu = { opacity = 1;  fade = true;  };
  blur-background = false;
};

###############################
#          Corners            #
###############################
# Note: Requires a fork of picom supporting rounded corners.
corner-radius = 0;

###############################
#          Fading             #
###############################
fading        = true;
fade-in-step  = 0.04;
fade-out-step = 0.04;

###############################
#  Transparency / Opacity     #
###############################
inactive-opacity           = 1;
frame-opacity              = 100;
inactive-opacity-override  = false;
active-opacity             = 100;

opacity-rule = [
  # "92:class_g = 'Code'",
  "92:class_g = 'discord'"
];

###############################
#   Transparent Clipping      #
###############################
transparent-clipping = true;
transparent-clipping-exclude = [];

###############################
#   Background Blurring       #
###############################
# Uncomment and adjust these options to enable background blurring.
blur-method   = "dual_kawase";
blur-strength = 4;
blur-kern     = "3x3box";

